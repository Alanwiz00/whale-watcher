# Manually build & push all WhaleWatcher images to GHCR, so Dokploy can PULL
# them instead of building on the host (use this if the VPS OOMs on build).
# Run from: Actions → "Build & push images" → Run workflow.
name: Build & push images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag
        default: latest

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  node-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, engine, collectors, bot]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Lowercase owner
        id: o
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/node.Dockerfile
          build-args: APP=${{ matrix.app }}
          push: true
          tags: ghcr.io/${{ steps.o.outputs.owner }}/whale-watcher-${{ matrix.app }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  web-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Lowercase owner
        id: o
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # NEXT_PUBLIC_* are baked into the bundle, so set them as repo Variables
      # (Settings → Secrets and variables → Actions → Variables). They must match
      # your public domains and one of the api app's API_KEYS.
      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_API_KEY=${{ secrets.NEXT_PUBLIC_API_KEY }}
          push: true
          tags: ghcr.io/${{ steps.o.outputs.owner }}/whale-watcher-web:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
