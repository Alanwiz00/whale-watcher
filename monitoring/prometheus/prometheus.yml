global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: whalewatcher

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:4000"]

  - job_name: collectors
    metrics_path: /metrics
    static_configs:
      - targets: ["collectors:9100"]

  - job_name: engine
    metrics_path: /metrics
    static_configs:
      - targets: ["engine:9101"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
